<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="style.css">
    <title>formulario</title> 
</head>
<body>
    <div id="parallelogram"></div>
    <section>
        <form action="#" method="post">
            <h1><strong>crie sua conta</strong></h1>
            <fieldset>
                <div class="container">
                <input type="text" required name="name" autofocus>
                <label>name</label>
                </div>
                <div class="container">
                    <input type="text" required name="sobrenome">
                    <label>sobrenome</label>
                </div>
            </fieldset>

            <fieldset>
                <div class="container">
                  <input type="email" required name="email">
                  <label> E-email</label>  
                </div>
            </fieldset>
            <fieldset>
                <div class="container">
                <input type="password" required name="password">
                <label>senha</label>
                </div>
                <div class="container">
                 <input type="password" required name="confirm">
                 <label>confirmar senha</label>
                </div>
            </fieldset>

            <fieldset>
                <div id="check">
                    <input type="checkbox" required name="accept">
                    <label>aceitar os termos de uso</label>
                </div>
                <button>criar conta</button>
            </fieldset>
            <a href="#"> ler termos de uso</a>
        </form>
    </section>
 <img src="user.svg">
</body>
</html>
